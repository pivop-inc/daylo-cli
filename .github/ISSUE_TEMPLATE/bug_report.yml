name: Bug report
description: Report a problem with the daylo CLI, API contract, or hosted service.
title: "Bug: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail for us to reproduce it without access to your private health data.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Hosted API
        - Provider connection
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command or endpoint
      description: "Example: daylo latest, POST /api/v1/sync"
      placeholder: daylo sync
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include request IDs or redacted error JSON when available.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Please include commands, flags, environment overrides, and whether this is against daylo.cc or a local compatible API.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Bun version, daylo install path, provider, and any relevant DAYLO_* environment variables.
      placeholder: |
        macOS 15.x
        bun 1.x
        bunx @pivop/daylo
        Provider: Withings
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have removed API keys, OAuth tokens, cookies, and raw health data from this report.
          required: true
